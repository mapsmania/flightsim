<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Allmaps Vintage Terrain - Freiburg</title>
    <script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css" rel="stylesheet" />
    
    <script type="importmap">
    {
      "imports": {
        "@allmaps/maplibre": "https://unpkg.com/@allmaps/maplibre?module",
        "@allmaps/render": "https://unpkg.com/@allmaps/render@1.0.0-beta.42/dist/index.js"
      }
    }
    </script>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #111; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        canvas { filter: sepia(0.5) contrast(1.1) brightness(0.9); }
    </style>
</head>
<body>

<div id="map"></div>

<script type="module">
    // Now we can import the name we defined in the importmap above
    import { WarpedMapLayer } from '@allmaps/maplibre';

    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json',
        center: [7.8522, 47.9990],
        zoom: 11.5,
        maxPitch: 0 // Allmaps works best without pitch
    });

    const annotationUrl = 'https://annotations.allmaps.org/manifests/a0d6d3379cfd9f0a';

    map.on('load', async () => {
        const warpedMapLayer = new WarpedMapLayer();
        map.addLayer(warpedMapLayer);
        
        try {
            await warpedMapLayer.addGeoreferenceAnnotationByUrl(annotationUrl);
            console.log("Freiburg Historical Map Loaded!");
        } catch (err) {
            console.error("Failed to load map:", err);
        }
    });
</script>
</body>
</html>
