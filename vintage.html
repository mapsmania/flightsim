<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Vintage Terrain Map</title>

<!-- MapLibre -->
<script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css" rel="stylesheet" />

<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />

<style>
    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #111;
    }

    #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
    }

    /* HUD */
    #hud {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        color: #f5e6c8;
        font-family: monospace;
        font-size: 13px;
        background: rgba(0,0,0,0.45);
        padding: 8px 10px;
        border-radius: 6px;
        backdrop-filter: blur(4px);
    }

    /* subtle paper/vintage feel */
    canvas {
        filter: sepia(0.55) contrast(1.1) brightness(0.95);
    }
</style>
</head>

<body>

<div id="map"></div>
<div id="hud">Vintage Terrain Viewer</div>

<script>
const map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.openfreemap.org/styles/liberty',
    center: [8.0587, 46.4768], // Alps (great for terrain)
    zoom: 10,
    pitch: 65,
    bearing: -15
});

map.on('load', () => {

    // -------------------------
    // 🏔️ TERRAIN (Mapterhorn)
    // -------------------------
    map.addSource('terrainSource', {
        type: 'raster-dem',
        url: 'https://tiles.mapterhorn.com/tilejson.json'
    });

    map.setTerrain({
        source: 'terrainSource',
        exaggeration: 1.3
    });

    // -------------------------
    // 🌄 HILLSHADE
    // -------------------------
    map.addLayer({
        id: 'hillshade',
        type: 'hillshade',
        source: 'terrainSource',
        paint: {
            'hillshade-shadow-color': '#3b2f2f',
            'hillshade-highlight-color': '#f5e6c8',
            'hillshade-exaggeration': 0.7
        }
    });

    // -------------------------
    // 🗺️ VINTAGE MAP OVERLAY
    // -------------------------
    map.addSource('vintage', {
        type: 'raster',
        tiles: [
            'https://wmts.oldmapsonline.org/maps/a823827f-a9ff-456f-905f-129aff5bd3ac/2026-04-14T11:53:32.240764Z/{z}/{x}/{y}.png?key=DzlRmpsjLYAYwet7EU5O'
        ],
        tileSize: 256,
        attribution: 'Old Maps Online'
    });

    map.addLayer({
        id: 'vintage-layer',
        type: 'raster',
        source: 'vintage',
        paint: {
            'raster-opacity': 0.45
        }
    });

    // -------------------------
    // 🌫️ ATMOSPHERIC FOG
    // -------------------------
    map.setFog({
        color: '#f2e3c6',
        'horizon-blend': 0.4
    });

});
</script>

</body>
</html>
