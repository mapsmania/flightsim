<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Flight Sim Lite</title>

    <!-- MapLibre -->
    <script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css" rel="stylesheet" />

    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: black;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }

        /* Simple cockpit HUD */
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ffcc;
            font-family: monospace;
            font-size: 14px;
            background: rgba(0,0,0,0.4);
            padding: 8px 10px;
            border-radius: 6px;
        }

        #help {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            font-family: sans-serif;
            font-size: 12px;
            background: rgba(0,0,0,0.4);
            padding: 6px 8px;
            border-radius: 6px;
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <div id="hud"></div>

    <div id="help">
        ↑ ↓ speed | ← → turn | W/S pitch
    </div>

<script type="module">
import FlightController from './FlightController.js';

let flight; // 👈 make it accessible everywhere

const map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.openfreemap.org/styles/liberty',
    center: [8.0587, 46.4768],
    zoom: 8,
    pitch: 75,
    bearing: -18.6
});

map.on('load', () => {

    map.addSource('terrainSource', {
        type: 'raster-dem',
        url: 'https://tiles.mapterhorn.com/tilejson.json'
    });

    map.setTerrain({
        source: 'terrainSource',
        exaggeration: 2.0
    });

    map.addLayer({
        id: 'hills',
        type: 'hillshade',
        source: 'terrainSource',
        paint: {
            'hillshade-shadow-color': '#473B24'
        }
    });


    // 👇 assign to outer variable
    flight = new FlightController(map, {
        speed: 0.001,
        pitch: 75,
        bearing: -18.6
    });

    flight.start();

    // Start HUD AFTER flight exists
    updateHUD();
});

// HUD loop
function updateHUD() {
    if (!flight) {
        requestAnimationFrame(updateHUD);
        return;
    }

    document.getElementById('hud').innerHTML = `
        Speed: ${flight.speed.toFixed(5)}<br>
        Bearing: ${flight.bearing.toFixed(1)}<br>
        Pitch: ${flight.pitch.toFixed(1)}
    `;

    requestAnimationFrame(updateHUD);
}
</script>
</body>
</html>
